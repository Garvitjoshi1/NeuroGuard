stages:
  prepare:
    cmd: python -c "from src.data_loader import load_data; df=load_data('data/raw/dataset.csv'); df.to_csv('data/processed/cleaned.csv', index=False)"
    deps:
      - data/raw/dataset.csv
      - src/data_loader.py
    outs:
      - data/processed/cleaned.csv
  train:
    cmd: python -m src.train
    deps:
      - data/processed/cleaned.csv
      - src/train.py
      - src/preprocess.py
      - src/data_loader.py
      - src/utils.py
    outs:
      - models/best_model.pkl
  evaluate:
    cmd: python -m src.evaluate
    deps:
      - models/best_model.pkl
      - data/processed/cleaned.csv
      - src/evaluate.py
    outs:
      - confusion_matrix.png
      - roc_curve.png